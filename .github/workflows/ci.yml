# Continuous integration — runs on every push and pull request.
#
# Cross-platform matrix (Linux / macOS / Windows). Same fmt + clippy + test
# steps on all three so any OS-specific regression (path handling, PTY,
# terminal capabilities) is caught before merge.
#
# Cache strategy: `Swatinem/rust-cache` restores $CARGO_HOME/registry +
# target dir keyed on Cargo.lock, so warm CI runs finish in ~1–2 min
# instead of ~15. The cache is keyed **per matrix row** (`shared-key`
# includes the OS) — a Linux target dir would be useless on Windows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs from the same ref (rebase-heavy PRs).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # CI gates on clippy's **correctness** group (real bugs: OOB indexing,
  # unreachable code, missing safety docs, …). Style / suspicious groups
  # stay at `warn` — visible locally, not a blocker — so a formatting
  # drift or a `needless_pass_by_value` doesn't gate every unrelated PR.
  RUSTFLAGS: ""

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      # One row failing shouldn't abort the others — we want the full
      # cross-platform picture on each PR.
      fail-fast: false
      matrix:
        include:
          - name: Linux · fmt + clippy + test
            os: ubuntu-latest
            shared-key: ci-linux
          - name: macOS · fmt + clippy + test
            os: macos-latest       # Apple Silicon runner (default since 2024)
            shared-key: ci-macos
          - name: Windows · fmt + clippy + test
            os: windows-latest
            shared-key: ci-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, pinned to rust-version)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Print toolchain
        shell: bash
        run: |
          rustc --version
          cargo --version
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.shared-key }}

      # fmt is host-agnostic; run it on every matrix row so a fmt drift
      # committed from any platform is caught wherever CI runs first.
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets --all-features
        # Gate only on the `correctness` group. Everything else stays a
        # local-only warning — see the env block above.
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::correctness

      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features --no-fail-fast

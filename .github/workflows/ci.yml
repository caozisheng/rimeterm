# Continuous integration — runs on every push and pull request.
#
# Cross-platform matrix (Linux / macOS / Windows). Same fmt + clippy + test
# steps on all three so any OS-specific regression (path handling, PTY,
# terminal capabilities) is caught before merge.
#
# Cache strategy: `Swatinem/rust-cache` restores $CARGO_HOME/registry +
# target dir keyed on Cargo.lock, so warm CI runs finish in ~1–2 min
# instead of ~15. The cache is keyed **per matrix row** (`shared-key`
# includes the OS) — a Linux target dir would be useless on Windows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Auto-fix fmt drift needs to push commits back to the branch. On PRs
# from forks this is impossible (token has no write access), so the
# commit step is gated on `github.event_name != 'pull_request'`.
permissions:
  contents: write

# Cancel superseded runs from the same ref (rebase-heavy PRs).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # CI gates on clippy's **correctness** group (real bugs: OOB indexing,
  # unreachable code, missing safety docs, …). Style / suspicious groups
  # stay at `warn` — visible locally, not a blocker — so a formatting
  # drift or a `needless_pass_by_value` doesn't gate every unrelated PR.
  RUSTFLAGS: ""

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      # One row failing shouldn't abort the others — we want the full
      # cross-platform picture on each PR.
      fail-fast: false
      matrix:
        include:
          - name: Linux · fmt + clippy + test
            os: ubuntu-latest
            shared-key: ci-linux
          - name: macOS · fmt + clippy + test
            os: macos-latest       # Apple Silicon runner (default since 2024)
            shared-key: ci-macos
          - name: Windows · fmt + clippy + test
            os: windows-latest
            shared-key: ci-windows

    steps:
      - uses: actions/checkout@v4

      # Pinned to the same channel as rust-toolchain.toml (which governs
      # local dev). One source of truth per environment; both files
      # updated together on a rustc bump.
      - name: Install Rust toolchain (pinned to 1.90)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"
          components: rustfmt, clippy

      - name: Print toolchain
        shell: bash
        run: |
          rustc --version
          cargo --version
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.shared-key }}

      # Auto-format then verify. `cargo fmt --all` fixes drift in-place;
      # the follow-up `--check` is a safety net (should always pass after
      # the write). If the write produced changes, the step below commits
      # and pushes them back to the branch so the tree stays fmt-clean
      # without forcing every contributor to remember `cargo fmt` locally.
      - name: cargo fmt --all (auto-fix)
        run: cargo fmt --all

      - name: cargo fmt --all --check (verify)
        run: cargo fmt --all --check

      # If `cargo fmt --all` rewrote anything, commit + push the fixup so
      # the branch stays fmt-clean. Only on Linux (fmt output is host-
      # agnostic — one push beats three racing) and only on push events
      # (PRs from forks can't push back). Uses the auto-injected
      # `GITHUB_TOKEN` with `contents: write` (see permissions block).
      - name: Commit fmt fixup (Linux, push only)
        if: matrix.shared-key == 'ci-linux' && github.event_name == 'push'
        shell: bash
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "fmt-clean; nothing to commit"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "style: cargo fmt --all (auto-fix by CI)"
            git push
            echo "pushed fmt fixup"
          fi

      - name: cargo clippy --workspace --all-targets --all-features
        # Gate only on the `correctness` group. Everything else stays a
        # local-only warning — see the env block above.
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::correctness

      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features --no-fail-fast

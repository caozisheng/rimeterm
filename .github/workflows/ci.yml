# Continuous integration — runs on every push and pull request.
#
# Windows-first per project convention (see docs §5 / README): we only
# gate on Windows for now. Linux / macOS runners land in a later revision
# once we've smoke-tested cross-platform behavior (portable-pty / crossterm
# are cross-platform but our CSI-DA responder + resize handling have only
# been exercised on ConPTY so far).
#
# Cache strategy: `Swatinem/rust-cache` restores $CARGO_HOME/registry +
# target dir keyed on Cargo.lock, so warm CI runs finish in ~1-2 min
# instead of ~15.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs from the same ref (rebase-heavy PRs).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # CI gates on clippy's **correctness** group (real bugs: OOB indexing,
  # unreachable code, missing safety docs, …). Style / suspicious groups
  # stay at `warn` — visible locally, not a blocker — so a formatting
  # drift or a `needless_pass_by_value` doesn't gate every unrelated PR.
  RUSTFLAGS: ""

jobs:
  windows:
    name: Windows · fmt + clippy + test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Pinned to Cargo.toml's `rust-version`. `dtolnay/rust-toolchain` is
      # the maintained action; installing an explicit version keeps this
      # job reproducible across GitHub-runner upgrades.
      - name: Install Rust toolchain (stable, pinned to rust-version)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Print toolchain
        shell: bash
        run: |
          rustc --version
          cargo --version
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Include Cargo.lock in the key so a dependency bump busts cache.
          shared-key: ci-windows

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets --all-features
        # Gate on the `correctness` group only. Everything else remains
        # a local-only warning (see the env block above).
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::correctness

      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features --no-fail-fast

# Release builds — produce distributable binaries for all three OSes.
#
# Trigger:
#   * push of a tag matching `v*` (e.g. `v0.1.0`, `v0.2.0-rc.1`) creates a
#     GitHub Release and uploads all per-platform archives as assets.
#   * `workflow_dispatch` builds the same artefacts without publishing a
#     Release (uploaded as run artefacts only), useful for testing the
#     packaging pipeline itself.
#
# Payload per archive (C21.5):
#   * `rimeterm` (+ `.exe` on Windows; icon embedded via winresource)
#   * `rimectl`
#   * `essentials/`  ← pinned yazi + ya + gitui + btm + VERSIONS.toml
#   * `LICENSE`, `README.md`, `ACKNOWLEDGEMENTS.md`
#
# Archive naming (matches Rust target triples so users can `curl` the right
# one from CI env vars):
#   * Linux   → `rimeterm-<version>-x86_64-unknown-linux-gnu.tar.gz`
#   * macOS   → `rimeterm-<version>-aarch64-apple-darwin.tar.gz` (Apple Silicon only)
#   * Windows → `rimeterm-<version>-x86_64-pc-windows-msvc.zip`
#
# Installers (v0.1.3+, alongside the archives, all bundling essentials):
#   * Windows → `rimeterm-<version>-x86_64.msi`
#                 cargo-wix with in-tree wix/main.wxs, %ProgramFiles%\rimeterm
#                 auto-appended to MACHINE PATH, Start-menu shortcut.
#   * Linux   → `rimeterm-<version>_amd64.deb`
#                 cargo-deb with debian/{postinst,prerm}, payload at
#                 /usr/lib/rimeterm/, symlinks in /usr/bin/.
#   * macOS   → `rimeterm-<version>-aarch64.pkg`
#                 pkgbuild + postinstall symlink, payload at
#                 /usr/local/lib/rimeterm/, symlinks in /usr/local/bin/.
#                 Unsigned — Gatekeeper right-click Open on first launch.
#
# On tag pushes `<version>` == the tag minus the leading `v`; on manual
# dispatch it's the short commit SHA so pre-release artefacts are traceable.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Version to build (e.g. "0.1.9" or "0.2.0-rc.1"). MUST be
          MAJOR.MINOR.PATCH[-prerelease] — WiX / pkgbuild reject
          anything else. Leave blank to auto-derive `0.0.0-dev.<sha>`.
        required: false
        type: string
        default: ""

permissions:
  contents: write   # needed to create the GitHub Release

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build:
    name: Package · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            shared-key: release-linux
          - target: aarch64-apple-darwin
            os: macos-latest     # Apple Silicon
            archive: tar.gz
            shared-key: release-macos-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            shared-key: release-windows

    steps:
      - uses: actions/checkout@v4

      # Pinned to match rust-toolchain.toml. Bump both files together.
      - name: Install Rust toolchain (pinned to 1.90)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"
          targets: ${{ matrix.target }}

      - name: Print toolchain
        shell: bash
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.shared-key }}

      - name: Resolve version string
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # `refs/tags/v0.1.0` -> `0.1.0`
            VERSION="${GITHUB_REF##refs/tags/v}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            # Explicit override from workflow_dispatch. Validate here so
            # the failure is one clean error, not a WiX version-parser
            # cryptic message 15 steps in.
            if [[ ! "${INPUT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.\-]+)?$ ]]; then
              echo "::error::input version '${INPUT_VERSION}' is not MAJOR.MINOR.PATCH[-prerelease]"
              exit 1
            fi
            VERSION="${INPUT_VERSION}"
          else
            # workflow_dispatch without input: emit a well-formed
            # pre-release identifier all three packagers (WiX, cargo-deb,
            # pkgbuild) accept.
            VERSION="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      # One cargo invocation so incremental linking + parallel codegen share
      # work across both binaries.
      - name: Cargo build --release (rimeterm + rimectl)
        run: cargo build --release --workspace --bins --target ${{ matrix.target }}

      # C21.5: fetch prebuilt yazi/gitui/bottom for this matrix row.
      # Pins live at essentials/VERSIONS.toml. The script hard-fails on
      # 404/checksum mismatch — release will error out cleanly if an
      # upstream tag or asset name changes.
      - name: Fetch prebuilt essentials
        shell: bash
        # Fetches into `crates/rimeterm/essentials-staging/` because
        # both cargo-deb (asset paths in [package.metadata.deb]) and
        # cargo-wix (Source= paths in wix/main.wxs) resolve relative
        # to the crate directory, not the workspace root. Sinking here
        # means the same on-disk layout satisfies all three consumers:
        # deb (assets), wix (File Source), and archive-stage below.
        run: |
          set -euo pipefail
          node .github/scripts/fetch-essentials.mjs \
            "${{ matrix.target }}" \
            "crates/rimeterm/essentials-staging"

      - name: Stage payload
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          NAME="rimeterm-${{ steps.version.outputs.value }}-${{ matrix.target }}"
          STAGE="staging/${NAME}"
          mkdir -p "${STAGE}"
          EXT=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then EXT=".exe"; fi
          cp "target/${{ matrix.target }}/release/rimeterm${EXT}" "${STAGE}/"
          cp "target/${{ matrix.target }}/release/rimectl${EXT}"  "${STAGE}/"
          cp LICENSE README.md ACKNOWLEDGEMENTS.md "${STAGE}/"
          # C21.5: bundle prebuilt essentials next to the rimeterm
          # binary so first launch can extract them into
          # ~/.rimeterm/bin/ (see rimeterm-config::assets::extract_essentials).
          mkdir -p "${STAGE}/essentials"
          cp -r crates/rimeterm/essentials-staging/. "${STAGE}/essentials/"
          echo "dir=${STAGE}"   >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"   >> "$GITHUB_OUTPUT"
          echo "Payload:"
          ls -la "${STAGE}"

      # `zip` (Windows) and `tar` (Unix) get different tools — split via
      # matrix.archive rather than shell-detection heuristics.
      - name: Create zip (Windows)
        if: matrix.archive == 'zip'
        id: zip
        shell: pwsh
        run: |
          $stage = "${{ steps.stage.outputs.dir }}"
          $name  = "${{ steps.stage.outputs.name }}"
          $out   = "$name.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $out -Force
          "path=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Get-Item $out | Format-List Name,Length

      - name: Create tar.gz (Unix)
        if: matrix.archive == 'tar.gz'
        id: tar
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.stage.outputs.name }}"
          OUT="${NAME}.tar.gz"
          # -C staging/ + bare NAME keeps the archive contents rooted under
          # the payload dir (`rimeterm-<ver>-<target>/…`), not `staging/`.
          tar -C staging -czf "${OUT}" "${NAME}"
          echo "path=${OUT}" >> "$GITHUB_OUTPUT"
          ls -la "${OUT}"

      - name: Resolve archive path
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            echo "path=${{ steps.zip.outputs.path }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ steps.tar.outputs.path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: rimeterm-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      # ─── Installers ─────────────────────────────────────────────
      # Native installer per OS. Only runs on the matching matrix row;
      # cargo-wix / cargo-deb / pkgbuild each need slightly different
      # setup, so we split by target instead of trying a single script.

      # cargo-wix wraps WiX Toolset v3 (candle.exe / light.exe). The
      # windows-latest runner has WiX pre-installed at
      # C:\Program Files (x86)\WiX Toolset v3.14\bin, but it's not on
      # PATH by default — add it so `cargo wix` can find the binaries.
      - name: Configure WiX path (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wixBin)) {
            # Fallback: install via chocolatey. GitHub runners already
            # have choco available.
            choco install wixtoolset --version=3.14.0 -y --no-progress
            $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          }
          echo "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "WiX bin on PATH: $wixBin"

      # Installers used to be marked continue-on-error while the
      # metadata was in flux. C21.5 pinned real wxs / deb layouts, so
      # they're now must-pass — a broken installer fails the release.

      - name: Install cargo-wix (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo install cargo-wix --locked --version ^0.3

      - name: Debug MSI layout (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        # Prove where cargo-wix will look. LGHT0103 keeps re-firing so
        # let's stop guessing and dump the actual on-disk state.
        run: |
          set -eu
          echo "=== PWD (workspace root) ==="
          pwd
          echo
          echo "=== workspace root ==="
          ls -la
          echo
          echo "=== crates/rimeterm ==="
          ls -la crates/rimeterm
          echo
          echo "=== crates/rimeterm/wix ==="
          ls -la crates/rimeterm/wix
          echo
          echo "=== crates/rimeterm/essentials-staging (if any) ==="
          ls -la crates/rimeterm/essentials-staging || echo "MISSING"
          echo
          echo "=== target/${{ matrix.target }}/release (bins) ==="
          ls -la "target/${{ matrix.target }}/release" | head -20 || echo "MISSING"

      - name: Build MSI (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        id: msi
        shell: bash
        # Ships crates/rimeterm/wix/main.wxs in-tree (C21.5). Uses
        # candle preprocessor variables `$(var.EssentialsDir)` and
        # `$(var.WorkspaceRoot)` to reach outside the wxs directory,
        # because light.exe's own path resolution (relative to wxs or
        # bindir, depending on version) has burned us twice — being
        # explicit with absolute paths kills that class of bug.
        run: |
          set -euo pipefail
          WSROOT="$(pwd -W 2>/dev/null || pwd)"
          ESSENTIALS="${WSROOT}/crates/rimeterm/essentials-staging"
          echo "WSROOT=${WSROOT}"
          echo "ESSENTIALS=${ESSENTIALS}"
          cargo wix --no-build \
            --package rimeterm \
            --target-bin-dir "target/${{ matrix.target }}/release" \
            -C "-dEssentialsDir=${ESSENTIALS}" \
            -C "-dWorkspaceRoot=${WSROOT}" \
            --install-version "${{ steps.version.outputs.value }}" \
            --nocapture \
            --output "rimeterm-${{ steps.version.outputs.value }}-x86_64.msi"
          ls -la "rimeterm-${{ steps.version.outputs.value }}-x86_64.msi"
          echo "path=rimeterm-${{ steps.version.outputs.value }}-x86_64.msi" \
            >> "$GITHUB_OUTPUT"

      - name: Install cargo-deb (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-deb --locked --version ^2

      - name: Build .deb (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        id: deb
        shell: bash
        # `--no-build` reuses the already-compiled release binary;
        # metadata sourced from [package.metadata.deb] in
        # crates/rimeterm/Cargo.toml (assets, description, etc).
        #
        # cargo-deb resolves every asset path relative to the crate
        # dir. The essentials-staging tree already sits there (Fetch
        # step above), but the workspace-root docs (README/LICENSE/
        # ACKNOWLEDGEMENTS) need a symlink stub — cheaper and less
        # intrusive than copying, and unwound at the end of the step.
        run: |
          set -euo pipefail
          ln -sf ../../README.md            crates/rimeterm/README.md
          ln -sf ../../LICENSE              crates/rimeterm/LICENSE
          ln -sf ../../ACKNOWLEDGEMENTS.md  crates/rimeterm/ACKNOWLEDGEMENTS.md
          cargo deb --no-build --target "${{ matrix.target }}" -p rimeterm -o "rimeterm-${{ steps.version.outputs.value }}_amd64.deb"
          rm -f crates/rimeterm/README.md crates/rimeterm/LICENSE crates/rimeterm/ACKNOWLEDGEMENTS.md
          ls -la "rimeterm-${{ steps.version.outputs.value }}_amd64.deb"
          echo "path=rimeterm-${{ steps.version.outputs.value }}_amd64.deb" \
            >> "$GITHUB_OUTPUT"

      - name: Build .pkg (macOS)
        if: matrix.target == 'aarch64-apple-darwin'
        id: pkg
        shell: bash
        # Unsigned pkg — Gatekeeper requires right-click Open on first
        # launch. Codesign / notarize would need an Apple Developer
        # account; deferred to a later checkpoint.
        #
        # Layout inside the pkg (C21.5):
        #   /usr/local/lib/rimeterm/rimeterm
        #   /usr/local/lib/rimeterm/rimectl
        #   /usr/local/lib/rimeterm/essentials/{yazi,ya,gitui,btm,VERSIONS.toml}
        #   /usr/local/share/doc/rimeterm/{README,LICENSE,ACKNOWLEDGEMENTS}
        #
        # postinstall symlinks /usr/local/bin/{rimeterm,rimectl} →
        # /usr/local/lib/rimeterm/. `env::current_exe()` on macOS
        # follows symlinks so `parent()?.join("essentials")` still
        # finds the bundled tools next to the real binary.
        run: |
          set -euo pipefail
          ROOT="pkgroot"
          SCRIPTS="pkgscripts"
          mkdir -p "$ROOT/usr/local/lib/rimeterm/essentials"
          mkdir -p "$ROOT/usr/local/share/doc/rimeterm"
          mkdir -p "$SCRIPTS"

          cp target/${{ matrix.target }}/release/rimeterm "$ROOT/usr/local/lib/rimeterm/"
          cp target/${{ matrix.target }}/release/rimectl  "$ROOT/usr/local/lib/rimeterm/"
          cp -R crates/rimeterm/essentials-staging/. "$ROOT/usr/local/lib/rimeterm/essentials/"
          cp README.md            "$ROOT/usr/local/share/doc/rimeterm/README"
          cp LICENSE              "$ROOT/usr/local/share/doc/rimeterm/LICENSE"
          cp ACKNOWLEDGEMENTS.md  "$ROOT/usr/local/share/doc/rimeterm/ACKNOWLEDGEMENTS"

          cat > "$SCRIPTS/postinstall" <<'EOF'
          #!/bin/sh
          set -e
          mkdir -p /usr/local/bin
          # `ln -sf` on Darwin: -F forces removal of an existing symlink
          # or file before creating the new one. -h prevents following
          # existing symlinks (idempotent across upgrades).
          ln -sfh /usr/local/lib/rimeterm/rimeterm /usr/local/bin/rimeterm
          ln -sfh /usr/local/lib/rimeterm/rimectl  /usr/local/bin/rimectl
          exit 0
          EOF
          chmod +x "$SCRIPTS/postinstall"

          OUT="rimeterm-${{ steps.version.outputs.value }}-aarch64.pkg"
          pkgbuild \
            --root "$ROOT" \
            --scripts "$SCRIPTS" \
            --identifier "com.rimeterm.app" \
            --version "${{ steps.version.outputs.value }}" \
            --install-location "/" \
            "$OUT"
          ls -la "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Resolve installer path
        id: installer
        shell: bash
        # Only one of the three installer steps ran (guarded by matrix
        # target). Collect its output into a single variable so the
        # upload step has a stable name to reference.
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" == "x86_64-pc-windows-msvc" ]]; then
            echo "path=${{ steps.msi.outputs.path }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            echo "path=${{ steps.deb.outputs.path }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            echo "path=${{ steps.pkg.outputs.path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload installer artefact
        # Skip when no installer path was produced (msi / deb steps
        # currently marked continue-on-error; missing output = we
        # deliberately let it fail without failing the whole matrix).
        if: steps.installer.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: rimeterm-${{ steps.version.outputs.value }}-${{ matrix.target }}-installer
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  # Aggregation job — only runs on real tag pushes. Downloads every build
  # matrix artefact and attaches them to a single GitHub Release.
  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List collected artefacts
        run: |
          find dist -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # download-artifact restores each build's zip/tarball inside its
          # own subdir under `dist/`; softprops accepts glob.
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

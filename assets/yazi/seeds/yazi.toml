# Seeded by rimeterm on first launch. Safe to edit; rimeterm never
# overwrites this file. Delete `~/.rimeterm/yazi/yazi.toml` to re-seed
# it on next start.
#
# See https://yazi-rs.github.io/docs/configuration/yazi for the full
# schema.

[mgr]
show_hidden = false
sort_by = "natural"
sort_sensitive = false

# Quick Look previewers.
#
# rimeterm ships the referenced Yazi plugins (`chafa.yazi`, `glow.yazi`)
# under `plugins/` and the backing binaries under `~/.rimeterm/bin/`, so
# these entries work zero-config.
#
# We match by file extension (`url` selector) rather than by MIME type
# because Yazi's MIME probe shells out to POSIX `file(1)`, which does
# not ship on Windows. Extension matching keeps Quick Look working on
# every platform with zero external-tool dependency beyond the two
# binaries we already ship.
#
# - Images -> chafa (coloured Unicode symbols; works on terminals that
#   lack Sixel / Kitty / iTerm2 graphics protocols, e.g. Windows
#   Terminal). Add extensions freely; every entry below is one glob.
# - Markdown -> glow (formatted prose; more readable than raw source).
[plugin]
prepend_previewers = [
    { url = "*.{png,jpg,jpeg,gif,bmp,webp,avif,ico,tif,tiff}", run = "chafa" },
    { url = "*.{md,markdown}",                                 run = "glow" },
]

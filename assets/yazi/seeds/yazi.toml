# Seeded by rimeterm on first launch. Safe to edit; rimeterm never
# overwrites this file. Delete `~/.rimeterm/yazi/yazi.toml` to re-seed
# it on next start.
#
# This is a minimal starting point — see
# https://yazi-rs.github.io/docs/configuration/yazi for the full schema.
#
# Common additions:
#   [plugin]
#   prepend_previewers = [
#     { name = "*.md",    run = "glow" },
#     { mime = "image/*", run = "chafa" },
#   ]
# (requires the corresponding preview plugins installed via `ya pkg add`).

[manager]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
